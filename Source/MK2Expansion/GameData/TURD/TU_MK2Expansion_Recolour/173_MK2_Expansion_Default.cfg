// Aero
// Adapter Intake

@PART[M2X_InlineIntake]:FOR[000_Standardised_Switching]:NEEDS[TexturesUnlimited&Mk2Expansion]
{
	MODULE
	{
		name = KSPTextureSwitch
		sectionName = Body
		currentTextureSet = Stock_Default_M2X_InlineIntake
		textureSet = Stock_Default_M2X_InlineIntake
	}
	MODULE
	{
		name = KSPTextureSwitch
		sectionName = Intakes
		currentTextureSet = Stock_Default_M2X_InlineIntake_Intakes
		textureSet = Stock_Default_M2X_InlineIntake_Intakes
	}
	%MODULE[SSTURecolorGUI]
	{
		%name = SSTURecolorGUI
	}
}
+KSP_TEXTURE_SET[Stock_Default]:NEEDS[TexturesUnlimited&Mk2Expansion]
{
	@name = Stock_Default_M2X_InlineIntake
	@MATERIAL
	{
		mesh = Adapter

		// excludeMesh = Intakes
		
		texture = _MainTex,Squad/Parts/FuelTank/mk2Adapters/mk2adapters1m
		texture = _BumpMap,TURD/TU_Standardised_Switching/000_PlaceholderTextures/Bump
		texture = _Emissive,TURD/TU_Standardised_Switching/000_PlaceholderTextures/Emis
		// texture = _AOMap,TURD/TU_Standardised_Switching/000_PlaceholderTextures/Occ
	}
}
+KSP_TEXTURE_SET[Stock_Default]:NEEDS[TexturesUnlimited&Mk2Expansion]
{
	@name = Stock_Default_M2X_InlineIntake_Intakes
	@MATERIAL
	{
		mesh = Intakes

		// excludeMesh = Adapter
		
		texture = _MainTex,Squad/Parts/Structural/mk1Parts/Mk1Structural
		texture = _BumpMap,TURD/TU_Standardised_Switching/000_PlaceholderTextures/Bump
		texture = _Emissive,Squad/Parts/Structural/mk1Parts/Mk1StructuralHeat
