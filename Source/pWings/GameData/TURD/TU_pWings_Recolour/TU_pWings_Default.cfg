// ProceduralDynamics/Parts/DYJproceduralwing2

@PART[Proceduralwing2,ProceduralAllMovingWing]:FOR[000_Standardised_Switching]:NEEDS[TexturesUnlimited,ProceduralDynamics]
{
	MODULE
	{
		name = KSPTextureSwitch
		sectionName = Appearance
		currentTextureSet = Stock_Default_pWings_2
		textureSet = Stock_Default_pWings_2
	}
	%MODULE[SSTURecolorGUI]
	{
		%name = SSTURecolorGUI
	}
}
+KSP_TEXTURE_SET[Stock_Default]:NEEDS[TexturesUnlimited,ProceduralDynamics]
{
	@name = Stock_Default_pWings_2
	@MATERIAL
	{
		@shader = KSP/Diffuse
		
		mesh = Cube
		
		texture = _MainTex,ProceduralDynamics/Parts/DYJproceduralwingAllMovingSurface/model000
	}
}

