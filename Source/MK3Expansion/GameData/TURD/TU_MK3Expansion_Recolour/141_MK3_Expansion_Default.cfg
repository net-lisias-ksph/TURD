// Aero
// BigSAirbrakes

@PART[M3X_AirbrakeA,M3X_AirbrakeB]:FOR[000_Standardised_Switching]:NEEDS[TexturesUnlimited&Mk3Expansion]
{
	MODULE
	{
		name = KSPTextureSwitch
		sectionName = Appearance
		currentTextureSet = Stock_Default_M3X_Airbrake
		textureSet = Stock_Default_M3X_Airbrake 
	}
	%MODULE[SSTURecolorGUI]
	{
		%name = SSTURecolorGUI
	}
}
+KSP_TEXTURE_SET[Stock_Default]
{
	@name = Stock_Default_M3X_Airbrake
	@MATERIAL
	{
		mesh = Flap
		
		excludeMesh = Rods
		excludeMesh = Base
		excludeMesh = Cylinder
		
		texture = _MainTex,Squad/Parts/Utility/mk2CargoBay/mk2CargoBay
		texture = _BumpMap,TURD/TU_Standardised_Switching/000_PlaceholderTextures/Bump
		texture = _Emissive,TURD/TU_Standardised_Switching/000_PlaceholderTextures/Emis
		// texture = _AOMap,TURD/TU_Standardised_Switching/000_PlaceholderTextures/Occ
	}
	MATERIAL
	{
		shader = KSP/Emissive/Bumped Specular
		
		mesh = Base
		
		excludeMesh = Flap
		excludeMesh = Rods
		excludeMesh = Cylinder
		
		texture = _MainTex,Squad/Parts/Aero/airbrake/Airbrake
		texture = _BumpMap,TURD/TU_Standardised_Switching/000_PlaceholderTextures/Bump
		texture = _Emissive,TURD/TU_Standardised_Switching/000_PlaceholderTextures/Emis
		// texture = _AOMap,TURD/TU_Standardised_Switching/000_PlaceholderTextures/Occ
	}
	MATERIAL
	{
		shader = KSP/Emissive/Bumped Specular

		mesh = Rods
		mesh = Cylinder
		
		texture = _MainTex,Squad/Parts/Aero/airbrake/Airbrake
		texture = _BumpMap,TURD/TU_Standardised_Switching/000_PlaceholderTextures/Bump
		texture = _Emissive,TURD/TU_Standardised_Switching/000_PlaceholderTextures/Emis
		// texture = _AOMap,TURD/TU_Standardised_Switching/000_PlaceholderTextures/Occ
	}
}

