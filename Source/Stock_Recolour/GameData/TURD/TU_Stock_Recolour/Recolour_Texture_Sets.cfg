KSP_TEXTURE_SET:NEEDS[TexturesUnlimited]
{
	name = MWNN_Stock_Tint
	title = Bob Ross 1
	recolorable = true
	
	MATERIAL
	{
		shader = SSTU/PBR/Masked
		
		PROPERTY
		{
			name = TINTING_MODE
			keyword = TINTING_MODE
		}
	}
	COLORS
	{
		mainColor = absolute_white
		secondColor = absolute_white
		detailColor = absolute_white
	}
}

